{% extends "base/base.html" %}

{% block title %}Admin — Entrar{% endblock %}

{% block content %}
<div class="max-w-md mx-auto min-h-dvh flex flex-col">
    <div class="flex-1 flex flex-col items-center justify-center px-6">
        <div class="w-full max-w-sm">
            <div class="text-center mb-8">
                <span class="w-3 h-3 rounded bg-fg inline-block"></span>
                <h1 class="text-lg font-extrabold tracking-tight mt-2">Painel Admin</h1>
            </div>

            {% if erro %}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-6">
                {{ erro }}
            </div>
            {% endif %}

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="text-xs text-muted uppercase tracking-wider mb-1.5 block">Usuário</label>
                    <input type="text" name="username" required class="w-full border-1.5 border-border rounded-xl px-4 py-3.5 text-sm focus:border-fg focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="text-xs text-muted uppercase tracking-wider mb-1.5 block">Senha</label>
                    <input type="password" name="password" required class="w-full border-1.5 border-border rounded-xl px-4 py-3.5 text-sm focus:border-fg focus:outline-none transition-colors">
                </div>
                <button type="submit" class="w-full bg-fg text-bg py-3.5 rounded-xl font-semibold hover:bg-accent transition-all">
                    Entrar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
