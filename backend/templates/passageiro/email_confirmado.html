{% extends "base/base.html" %}
{% load static %}

{% block title %}E-mail Confirmado{% endblock %}

{% block content %}
<div class="max-w-md mx-auto min-h-dvh flex flex-col">
    <header class="px-5 py-4 flex items-center gap-3 border-b border-border">
        <a href="{% url 'site_publico:pedir_corrida' %}" class="w-9 h-9 rounded-full bg-surface border border-border flex items-center justify-center hover:bg-fg hover:text-bg transition-all">←</a>
        <h1 class="text-lg font-bold tracking-tight">E-mail Confirmado</h1>
    </header>

    <div class="flex-1 flex flex-col items-center justify-center px-5 text-center">
        <div class="w-20 h-20 rounded-full bg-accent/10 flex items-center justify-center mb-6">
            <svg class="w-10 h-10 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-extrabold tracking-tighter mb-2">Tudo pronto!</h2>
        <p class="text-muted text-sm mb-6">Seu e-mail foi confirmado. Agora você pode pedir sua primeira corrida.</p>
        <a href="{% url 'site_publico:pedir_corrida' %}" class="bg-fg text-bg w-full sm:w-auto px-7 py-3.5 rounded-pill font-semibold text-sm hover:bg-accent transition-all">
            Pedir corrida
        </a>
    </div>
</div>
{% endblock %}
