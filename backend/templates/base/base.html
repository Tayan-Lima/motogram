{% load static %}
<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
    <link rel="icon" href="{% static 'motogram-go-logo.png' %}" type="image/png">
    <title>{% block title %}Motogram GO{% endblock %} — Moto Táxi na Amazônia</title>
    <script src="https://cdn.tailwindcss.com"></script>
        <style>
            img[alt="Motogram GO"] {
                height: 124px !important;
                width: auto !important;
                max-width: 50vw !important;
                object-fit: contain !important;
            }
            .btn-primary { transition: all 0.15s; }
            .btn-primary:active { transform: scale(0.98); }
            .card { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.03); }
        </style>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/mask@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#FAF7F2',
                        surface: '#FFFFFF',
                        fg: '#1A1815',
                        muted: '#6B6560',
                        border: '#E8E3DB',
                        accent: '#1B7A3D',
                        accent2: '#C75B39',
                        gold: '#C4942A',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Segoe UI', 'system-ui', 'sans-serif'],
                    },
                    borderRadius: {
                        'pill': '100px',
                    },
                    borderWidth: {
                        '1.5': '1.5px',
                    },
                },
            },
        }
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-bg text-fg font-sans min-h-dvh">
    {% block content %}{% endblock %}
    {% block extra_scripts %}{% endblock %}
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('{% static "sw.js" %}').catch(() => {});
        }
    </script>
</body>
</html>
